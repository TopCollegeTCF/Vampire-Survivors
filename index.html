<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vamp project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Главное меню — показывается при загрузке страницы -->
    <div id="menu" class="menu">
        <h1>Главное меню</h1>
        <button id="start-button">Начать игру</button>
        <button id="difficulty-button">Сложность: Нормально</button>
        <button id="exit-button">Выход</button>
    </div>

    <!-- Экран выбора сложности — открывается из главного меню -->
    <div id="difficulty-screen" class="menu" style="display:none;">
        <h1>Сложность</h1>
        <button id="diff-easy">Легко</button>
        <button id="diff-normal">Нормально</button>
        <button id="diff-hard">Сложно</button>
        <button id="diff-back">Назад</button>
    </div>

    <!-- Меню паузы — появляется при нажатии Esc во время игры -->
    <div id="pause-menu" class="menu" style="display:none;">
        <h1>Пауза</h1>
        <button id="resume-button">Продолжить</button>
        <button id="pause-exit-button">Выход в меню</button>
    </div>

    <!-- Игровой контейнер — область игры.
         Игрок, враги и пули создаются внутри через JS. -->
    <div id="game-container" class="game-container"></div>

    <!-- HUD: патроны, волна, счётчик убийств, баннер волны -->
    <div id="ammo-indicator" style="display:none;">Патроны: 999/999</div>
    <div id="wave-indicator" style="display:none;">Волна: 1</div>
    <div id="kill-counter"   style="display:none;">Убито: 0</div>
    <div id="wave-announce"  style="display:none;"></div>

    <!-- Полоса здоровья игрока — внизу по центру -->
    <div id="player-healthbar-wrap" style="display:none;">
        <div class="hud-bar-block">
            <span id="player-hp-label" class="hud-bar-title">Здоровье</span>
            <div id="player-healthbar-bg" class="hud-bar-track">
                <div id="player-healthbar-fill"></div>
            </div>
            <span id="player-hp-value" class="hud-bar-value">100</span>
        </div>
    </div>

    <!-- Опыт: уровень и полоска -->
    <div id="exp-bar-wrap" style="display:none;">
        <div class="hud-bar-block exp-hud">
            <span id="exp-level-label" class="hud-bar-title">Ур. 1</span>
            <div id="exp-bar-track" class="hud-bar-track exp-track">
                <div id="exp-bar-fill"></div>
            </div>
            <span id="exp-bar-text" class="hud-bar-value">0 / 100</span>
        </div>
    </div>

    <!-- Экран окончания игры — показывается при смерти игрока -->
    <div id="game-over-message" style="display:none;">
        <div id="game-over-text">Игра закончена!</div>
        <button id="restart-button">Главное меню</button>
    </div>

    <!-- Порядок важен: конфиг → состояние → логгер → DOM UI → герой → бой → ядро -->
    <script src="js/config/game-config.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/logger.js"></script>
    <script src="js/ui/ui.js"></script>
    <script src="js/core/hero.js"></script>
    <script src="js/core/combat.js"></script>
    <script src="js/core/core.js"></script>
    <!-- Canvas API: герой / оружие / кристаллы и HUD (drawScore, drawTimer, drawExpBar) -->
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/core/qa.js"></script>
    <!-- script.js — монолитная версия; не подключать вместе с модульным ядром выше -->
</body>
</html>
